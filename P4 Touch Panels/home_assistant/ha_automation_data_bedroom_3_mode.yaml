# Home Assistant: room desired state → MQTT (HA → panels). See README.
# Must match firmware SCREEN_TEST_MQTT_ROOM_STATE_TOPIC (default esp_hmi/data/bedroom3/desired_state).

alias: ESP HMI - Data - Bedroom 3 Mode
description: Updates Bedroom 3's desired state over MQTT
triggers:
  - trigger: state
    entity_id: input_select.ollie_room_desired_state
actions:
  - action: mqtt.publish
    data:
      topic: esp_hmi/data/bedroom3/desired_state
      payload: "{{ states('input_select.ollie_room_desired_state') }}"
      retain: true
mode: single
