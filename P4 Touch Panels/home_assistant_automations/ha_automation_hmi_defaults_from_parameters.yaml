# Home Assistant: optional idle/default bootstrap when HMIs publish esp_hmi/device/<mac>/status/parameters.
#
# WARNING — Default screen vs UI:
# If you use the esp_hmi integration's **Default screen** select, do NOT auto-publish
# `cmd/set_default_screen` from this automation. Every `status/parameters` update (including
# after you pick a new default) retriggers this automation and will **overwrite** your choice
# with the hardcoded slug below (e.g. `front_gate` for 30eda0e20a61).
#
# The blocks under `cmd/set_default_screen` are therefore **commented out** by default.
# Uncomment only for panels where you want HA to always enforce a fixed default (no UI edits).
#
# `cmd/set_idle_timeout` can still fight loops if published on every parameters message — see
# ha_automation_hmi_idle_from_parameters.yaml comments; gate or disable if needed.

alias: ESP HMI - Defaults from MAC (parameters heartbeat)
description: Optional idle timeout push per MAC; default-screen publish disabled (see file header)
triggers:
  - trigger: mqtt
    topic: esp_hmi/device/+/status/parameters
actions:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ trigger.topic.split('/')[2] | lower == '30eda0e20a9e' }}"
        sequence:
          # - action: mqtt.publish
          #   data:
          #     topic: esp_hmi/device/30eda0e20a9e/cmd/set_default_screen
          #     payload: ollie_room
          #     qos: 1
          - action: mqtt.publish
            data:
              topic: esp_hmi/device/30eda0e20a9e/cmd/set_idle_timeout
              payload: '{"screen":"ollie_room","seconds":45}'
              qos: 1
      - conditions:
          - condition: template
            value_template: "{{ trigger.topic.split('/')[2] | lower == '30eda0e20a61' }}"
        sequence:
          # - action: mqtt.publish
          #   data:
          #     topic: esp_hmi/device/30eda0e20a61/cmd/set_default_screen
          #     payload: front_gate
          #     qos: 1
          - action: mqtt.publish
            data:
              topic: esp_hmi/device/30eda0e20a61/cmd/set_idle_timeout
              payload: '{"screen":"ollie_room","seconds":45}'
              qos: 1
mode: queued
